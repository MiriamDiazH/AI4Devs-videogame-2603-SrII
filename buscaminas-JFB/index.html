<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscaminas — Dark Glass</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A3%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!-- Decorative background blobs -->
    <div class="bg-blob bg-blob--one" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--two" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--three" aria-hidden="true"></div>

    <main class="app">
      <header class="app__header">
        <h1 class="app__title">
          <span class="app__title-icon">💣</span>
          Buscaminas
        </h1>
        <p class="app__subtitle">Encuentra todas las casillas seguras sin detonar una mina.</p>
      </header>

      <!-- Difficulty selector -->
      <section class="controls" aria-label="Controles del juego">
        <div class="controls__group" role="radiogroup" aria-label="Dificultad">
          <button class="chip is-active" data-difficulty="beginner" type="button">
            Principiante
            <small>9 × 9 · 10 💣</small>
          </button>
          <button class="chip" data-difficulty="intermediate" type="button">
            Intermedio
            <small>16 × 16 · 40 💣</small>
          </button>
        </div>
        <button id="restartBtn" class="btn btn--primary" type="button" title="Reiniciar partida (R)">
          <span aria-hidden="true">↻</span> Reiniciar
        </button>
      </section>

      <!-- HUD -->
      <section class="hud glass" aria-label="Información de la partida">
        <div class="hud__item" aria-live="polite">
          <span class="hud__icon">🚩</span>
          <div class="hud__text">
            <span class="hud__label">Minas restantes</span>
            <span id="mineCounter" class="hud__value">000</span>
          </div>
        </div>

        <div id="statusFace" class="hud__face" role="status" aria-label="Estado">
          <span id="statusFaceIcon">🙂</span>
        </div>

        <div class="hud__item hud__item--right" aria-live="polite">
          <span class="hud__icon">⏱️</span>
          <div class="hud__text">
            <span class="hud__label">Tiempo</span>
            <span id="timer" class="hud__value">000</span>
          </div>
        </div>
      </section>

      <!-- Board -->
      <section class="board-wrapper glass">
        <div id="board" class="board" role="grid" aria-label="Tablero de buscaminas"></div>
      </section>

      <footer class="app__footer">
        <p>
          <kbd>Clic izq.</kbd> revelar · <kbd>Clic der.</kbd> bandera · <kbd>R</kbd> reiniciar
        </p>
      </footer>
    </main>

    <!-- Game over / win modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__panel glass">
        <div id="modalIcon" class="modal__icon">🎉</div>
        <h2 id="modalTitle" class="modal__title">¡Victoria!</h2>
        <p id="modalMessage" class="modal__message">Lo lograste.</p>
        <div class="modal__actions">
          <button id="modalRestartBtn" class="btn btn--primary" type="button">Jugar otra vez</button>
          <button class="btn btn--ghost" type="button" data-close>Cerrar</button>
        </div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
